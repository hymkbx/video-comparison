<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频超分效果对比</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px 20px;
            background: rgba(20, 20, 30, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.2rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        /* 视频组选择器 */
        .video-group-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .group-btn {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #a0a0b0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .group-btn:hover {
            background: rgba(124, 58, 237, 0.3);
            color: #fff;
        }

        .group-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-color: transparent;
            color: #fff;
            font-weight: 600;
        }

        /* 视频对比区域 - 放大占满 */
        .video-comparison-container {
            position: relative;
            flex: 1;
            min-height: 400px;
            border-radius: 12px;
            overflow: hidden;
            cursor: col-resize;
            background: #000;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .video-left {
            z-index: 1;
        }

        .video-right {
            z-index: 2;
            clip-path: inset(0 0 0 50%);
        }

        /* 标签 */
        .label {
            position: absolute;
            top: 15px;
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .label-left {
            left: 15px;
            color: #ff6b6b;
        }

        .label-right {
            right: 15px;
            color: #4ecdc4;
        }

        /* 分界线 */
        .slider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #00d4ff, #fff, #7c3aed);
            z-index: 20;
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .slider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 50%;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
            transition: transform 0.15s ease;
            cursor: grab;
        }

        .slider-handle:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .slider-handle::before,
        .slider-handle::after {
            content: '';
            position: absolute;
            width: 7px;
            height: 7px;
            border-top: 2px solid #fff;
            border-right: 2px solid #fff;
        }

        .slider-handle::before {
            left: 10px;
            transform: rotate(-135deg);
        }

        .slider-handle::after {
            right: 10px;
            transform: rotate(45deg);
        }

        /* 控制区域 - 移到下方 */
        .controls-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .progress-bar-container {
            width: 100%;
            max-width: 600px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            width: 0%;
            transition: width 0.1s linear;
        }

        .buttons-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(124, 58, 237, 0.4));
            transform: translateY(-2px);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
        }

        .sync-btn {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .sync-btn:hover {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4caf50;
        }

        .sync-btn.synced {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4caf50;
            color: #4caf50;
        }

        /* 加载提示 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 12px;
            color: #8892b0;
            font-size: 0.9rem;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1rem;
            }

            .group-btn {
                padding: 8px 12px;
                font-size: 0.75rem;
            }

            .slider-handle {
                width: 36px;
                height: 36px;
            }

            .label {
                font-size: 0.7rem;
                padding: 5px 10px;
            }

            .control-btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 视频超分效果对比展示</h1>
    </div>

    <div class="main-container">
        <!-- 视频组选择器 -->
        <div class="video-group-selector" id="groupSelector">
            <button class="group-btn active" data-group="0">第一组：战斗场景</button>
            <button class="group-btn" data-group="1">第二组：墨染场景</button>
            <button class="group-btn" data-group="2">第三组：战争场景1</button>
            <button class="group-btn" data-group="3">第四组：战争场景2</button>
            <button class="group-btn" data-group="4">第五组：将军战斗</button>
        </div>

        <!-- 视频对比区域 -->
        <div class="video-comparison-container" id="comparisonContainer">
            <div class="video-wrapper video-left">
                <video id="videoLeft" muted playsinline loop>
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="video-wrapper video-right" id="videoRightWrapper">
                <video id="videoRight" muted playsinline loop>
                    <source src="" type="video/mp4">
                </video>
            </div>

            <span class="label label-left" id="labelLeft">原视频</span>
            <span class="label label-right" id="labelRight">超分后</span>

            <div class="slider-line" id="sliderLine">
                <div class="slider-handle" id="sliderHandle">
                </div>
            </div>

            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">加载视频中...</div>
            </div>
        </div>

        <!-- 控制区域 - 移到下方 -->
        <div class="controls-area">
            <div class="progress-bar-container" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="buttons-row">
                <button class="control-btn" id="playBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    播放
                </button>
                <button class="control-btn sync-btn" id="syncBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                    </svg>
                    重新同步
                </button>
            </div>
        </div>
    </div>

    <script>
        // 视频数据配置
        const videoGroups = [
            {
                name: '战斗场景',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/fight_01.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/fight-slp-2.5.mp4'
            },
            {
                name: '墨染场景',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/ink.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/ink-slp-2.5.mp4'
            },
            {
                name: '战争场景1',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war01.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war01-slp-2.5.mp4'
            },
            {
                name: '战争场景2',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war02.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war02-slp-2.5.mp4'
            },
            {
                name: '将军战斗',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/general_fight.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/general_fight_slp-2.5.mp4'
            }
        ];

        let currentGroup = 0;
        let sliderPosition = 50;
        let isPlaying = false;
        let isDragging = false;
        let lastTimestamp = 0;
        let animationId = null;

        const container = document.getElementById('comparisonContainer');
        const sliderLine = document.getElementById('sliderLine');
        const sliderHandle = document.getElementById('sliderHandle');
        const videoLeft = document.getElementById('videoLeft');
        const videoRight = document.getElementById('videoRight');
        const videoRightWrapper = document.getElementById('videoRightWrapper');
        const playBtn = document.getElementById('playBtn');
        const syncBtn = document.getElementById('syncBtn');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // 更新滑块位置
        function updateSliderPosition(position) {
            sliderPosition = Math.max(0, Math.min(100, position));
            sliderLine.style.left = sliderPosition + '%';
            videoRightWrapper.style.clipPath = `inset(0 0 0 ${sliderPosition}%)`;
        }

        // 同步两个视频
        function syncVideos() {
            const offset = videoLeft.currentTime - videoRight.currentTime;
            if (Math.abs(offset) > 0.05) {
                videoRight.currentTime = videoLeft.currentTime;
            }
        }

        // 加载视频组
        function loadGroup(index) {
            const group = videoGroups[index];
            currentGroup = index;

            // 停止播放
            if (isPlaying) {
                togglePlay();
            }

            // 显示加载
            loadingOverlay.classList.remove('hidden');

            // 更新按钮状态
            document.querySelectorAll('.group-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });

            // 重置
            progressFill.style.width = '0%';
            updateSliderPosition(50);

            // 设置视频源
            videoLeft.src = group.left;
            videoRight.src = group.right;

            // 等待视频加载完成
            Promise.all([
                new Promise(resolve => {
                    videoLeft.onloadedmetadata = resolve;
                    videoLeft.onerror = resolve;
                }),
                new Promise(resolve => {
                    videoRight.onloadedmetadata = resolve;
                    videoRight.onerror = resolve;
                })
            ]).then(() => {
                loadingOverlay.classList.add('hidden');
                // 初始同步
                syncVideos();
            });
        }

        // 播放/暂停
        function togglePlay() {
            if (isPlaying) {
                videoLeft.pause();
                videoRight.pause();
                cancelAnimationFrame(animationId);
                playBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    播放
                `;
                syncBtn.classList.remove('synced');
            } else {
                syncVideos();
                videoLeft.play();
                videoRight.play();
                playBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                    暂停
                `;
                syncBtn.classList.add('synced');
                syncLoop();
            }
            isPlaying = !isPlaying;
        }

        // 同步循环
        function syncLoop() {
            if (!isPlaying) return;
            syncVideos();
            animationId = requestAnimationFrame(syncLoop);
        }

        // 拖动事件
        function handleDragStart(e) {
            e.preventDefault();
            isDragging = true;
        }

        function handleDrag(e) {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const position = ((clientX - rect.left) / rect.width) * 100;
            updateSliderPosition(position);
        }

        function handleDragEnd() {
            isDragging = false;
        }

        sliderHandle.addEventListener('mousedown', handleDragStart);
        sliderLine.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDrag);
        document.addEventListener('mouseup', handleDragEnd);

        sliderHandle.addEventListener('touchstart', handleDragStart, { passive: false });
        sliderLine.addEventListener('touchstart', handleDragStart, { passive: false });
        document.addEventListener('touchmove', handleDrag, { passive: true });
        document.addEventListener('touchend', handleDragEnd);

        // 点击进度条跳转
        progressBar.addEventListener('click', (e) => {
            if (!videoLeft.duration) return;
            const rect = progressBar.getBoundingClientRect();
            const position = (e.clientX - rect.left) / rect.width;
            const time = position * videoLeft.duration;
            videoLeft.currentTime = time;
            videoRight.currentTime = time;
        });

        // 事件监听
        playBtn.addEventListener('click', togglePlay);

        syncBtn.addEventListener('click', () => {
            syncVideos();
            if (isPlaying) {
                syncBtn.classList.add('synced');
            }
        });

        videoLeft.addEventListener('timeupdate', () => {
            if (videoLeft.duration) {
                const progress = (videoLeft.currentTime / videoLeft.duration) * 100;
                progressFill.style.width = progress + '%';
            }
        });

        videoLeft.addEventListener('ended', () => {
            // 循环播放时重新同步
            videoRight.currentTime = 0;
            if (isPlaying) {
                videoRight.play();
                syncVideos();
            }
        });

        videoRight.addEventListener('ended', () => {
            videoLeft.currentTime = 0;
            if (isPlaying) {
                videoLeft.play();
                syncVideos();
            }
        });

        // 视频组切换
        document.getElementById('groupSelector').addEventListener('click', (e) => {
            if (e.target.classList.contains('group-btn')) {
                const index = parseInt(e.target.dataset.group);
                if (index !== currentGroup) {
                    loadGroup(index);
                }
            }
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                updateSliderPosition(sliderPosition - 5);
            } else if (e.key === 'ArrowRight') {
                updateSliderPosition(sliderPosition + 5);
            } else if (e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
        });

        // 初始化
        loadGroup(0);
    </script>
</body>
</html>
