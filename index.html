<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频效果对比滑块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .video-comparison-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            cursor: col-resize;
            background: #000;
        }

        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 高清视频层 */
        .video-high {
            z-index: 2;
            clip-path: inset(0 0 0 50%);
            transition: clip-path 0.05s ease-out;
        }

        /* 标签 */
        .label {
            position: absolute;
            top: 20px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .label-low {
            left: 20px;
            color: #ff6b6b;
        }

        .label-high {
            right: 20px;
            color: #4ecdc4;
        }

        /* 分界线 */
        .slider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg,
                #00d4ff 0%,
                #7c3aed 50%,
                #00d4ff 100%);
            z-index: 20;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5),
                        0 0 40px rgba(124, 58, 237, 0.3);
        }

        /* 滑块把手 */
        .slider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 50%;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4),
                        0 0 30px rgba(124, 58, 237, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .slider-handle:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.6),
                        0 0 50px rgba(124, 58, 237, 0.5);
        }

        .slider-handle::before,
        .slider-handle::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-top: 2px solid #fff;
            border-right: 2px solid #fff;
        }

        .slider-handle::before {
            left: 12px;
            transform: rotate(-135deg);
        }

        .slider-handle::after {
            right: 12px;
            transform: rotate(45deg);
        }

        .slider-handle .handle-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* 播放控制 */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 15;
        }

        .control-btn {
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: rgba(124, 58, 237, 0.5);
            border-color: #7c3aed;
            transform: translateY(-2px);
        }

        .control-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 提示文字 */
        .hint {
            margin-top: 20px;
            color: #5a6a8a;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hint svg {
            width: 16px;
            height: 16px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 进度条 */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 15;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            .video-comparison-container {
                border-radius: 12px;
            }

            .label {
                font-size: 0.75rem;
                padding: 6px 12px;
            }

            .slider-handle {
                width: 40px;
                height: 40px;
            }

            .control-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }

        /* 视频加载占位 */
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .placeholder-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .placeholder-text {
            color: #8892b0;
            font-size: 1rem;
        }

        .placeholder-hint {
            color: #5a6a8a;
            font-size: 0.85rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>视频效果对比</h1>
    <p class="subtitle">拖动滑块查看不同清晰度的视频效果</p>

    <div class="video-comparison-container" id="comparisonContainer">
        <!-- 低清视频层 (底层) -->
        <div class="video-wrapper video-low">
            <video id="videoLow" muted playsinline loop>
                <source src="low_quality.mp4" type="video/mp4">
                <!-- 备用的示例视频 -->
                <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
            </video>
        </div>

        <!-- 高清视频层 (顶层，通过 clip-path 控制显示区域) -->
        <div class="video-wrapper video-high" id="videoHighWrapper">
            <video id="videoHigh" muted playsinline loop>
                <source src="high_quality.mp4" type="video/mp4">
                <!-- 使用相同视频作为示例，实际使用时替换为高清版本 -->
                <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
            </video>
        </div>

        <!-- 标签 -->
        <span class="label label-low">低画质</span>
        <span class="label label-high">高画质</span>

        <!-- 分界线 -->
        <div class="slider-line" id="sliderLine">
            <div class="slider-handle" id="sliderHandle">
                <div class="handle-dot"></div>
            </div>
        </div>

        <!-- 播放控制 -->
        <div class="controls">
            <button class="control-btn" id="playBtn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                播放
            </button>
            <button class="control-btn" id="syncBtn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                </svg>
                同步播放
            </button>
        </div>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- 视频加载占位 -->
        <div class="video-placeholder" id="videoPlaceholder">
            <svg class="placeholder-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
            </svg>
            <span class="placeholder-text">视频加载中...</span>
            <span class="placeholder-hint">请替换为你的低画质/高画质视频</span>
        </div>
    </div>

    <p class="hint">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M13.5,5.5C14.59,5.5 15.5,4.58 15.5,3.5C15.5,2.38 14.59,1.5 13.5,1.5C12.39,1.5 11.5,2.38 11.5,3.5C11.5,4.58 12.39,5.5 13.5,5.5M9.89,19.38L10.89,15L13,17V23H15V15.5L12.89,13.5L13.5,10.5C14.79,12 16.79,13 19,13V11C17.09,11 15.5,10 14.69,8.58L13.69,7C13.29,6.38 12.69,6 12,6C11.69,6 11.5,6.08 11.19,6.19L6,8.28V13H8V9.58L9.79,8.88L8.19,17L3.29,16L2.89,18L9.89,19.38Z"/>
        </svg>
        拖动中间滑块或点击播放按钮开始对比
    </p>

    <script>
        const container = document.getElementById('comparisonContainer');
        const sliderLine = document.getElementById('sliderLine');
        const sliderHandle = document.getElementById('sliderHandle');
        const videoHighWrapper = document.getElementById('videoHighWrapper');
        const videoLow = document.getElementById('videoLow');
        const videoHigh = document.getElementById('videoHigh');
        const playBtn = document.getElementById('playBtn');
        const syncBtn = document.getElementById('syncBtn');
        const progressFill = document.getElementById('progressFill');
        const videoPlaceholder = document.getElementById('videoPlaceholder');

        let sliderPosition = 50; // 初始位置 50%
        let isPlaying = false;
        let isDragging = false;

        // 初始化位置
        function updateSliderPosition(position) {
            sliderPosition = Math.max(0, Math.min(100, position));
            sliderLine.style.left = sliderPosition + '%';
            videoHighWrapper.style.clipPath = `inset(0 0 0 ${sliderPosition}%)`;
        }

        // 鼠标/触摸事件 - 拖动滑块
        function handleDragStart(e) {
            isDragging = true;
            handleDrag(e);
        }

        function handleDrag(e) {
            if (!isDragging) return;

            const rect = container.getBoundingClientRect();
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const position = ((clientX - rect.left) / rect.width) * 100;

            updateSliderPosition(position);
        }

        function handleDragEnd() {
            isDragging = false;
        }

        // 鼠标事件
        container.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDrag);
        document.addEventListener('mouseup', handleDragEnd);

        // 触摸事件
        container.addEventListener('touchstart', handleDragStart, { passive: true });
        document.addEventListener('touchmove', handleDrag, { passive: true });
        document.addEventListener('touchend', handleDragEnd);

        // 点击跳转到指定位置
        container.addEventListener('click', (e) => {
            if (!isDragging) {
                const rect = container.getBoundingClientRect();
                const position = ((e.clientX - rect.left) / rect.width) * 100;
                updateSliderPosition(position);
            }
        });

        // 播放控制
        function togglePlay() {
            if (isPlaying) {
                videoLow.pause();
                videoHigh.pause();
                playBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    播放
                `;
            } else {
                videoLow.play();
                videoHigh.play();
                playBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                    暂停
                `;
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        // 同步播放进度
        videoLow.addEventListener('timeupdate', () => {
            if (!isPlaying) return;
            const progress = (videoLow.currentTime / videoLow.duration) * 100;
            progressFill.style.width = progress + '%';
        });

        videoLow.addEventListener('ended', () => {
            videoHigh.currentTime = 0;
            progressFill.style.width = '0%';
            isPlaying = false;
            playBtn.innerHTML = `
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                播放
            `;
        });

        // 隐藏占位符
        videoLow.addEventListener('loadeddata', () => {
            videoPlaceholder.style.display = 'none';
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                updateSliderPosition(sliderPosition - 5);
            } else if (e.key === 'ArrowRight') {
                updateSliderPosition(sliderPosition + 5);
            } else if (e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
        });

        // 初始化
        updateSliderPosition(50);
    </script>
</body>
</html>
