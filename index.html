<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频效果对比展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 30px;
        }

        /* 视频组选择器 */
        .video-group-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .group-btn {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .group-btn:hover {
            background: rgba(124, 58, 237, 0.3);
            border-color: #7c3aed;
        }

        .group-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-color: transparent;
            font-weight: 600;
        }

        /* 精度选择器 */
        .quality-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .quality-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #a0a0b0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quality-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
        }

        .quality-btn.active {
            color: #fff;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
        }

        /* 视频对比容器 */
        .video-comparison-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            cursor: col-resize;
            background: #000;
        }

        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-high {
            z-index: 2;
            clip-path: inset(0 0 0 50%);
        }

        /* 标签 */
        .label {
            position: absolute;
            top: 20px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .label-left {
            left: 20px;
            color: #ff6b6b;
        }

        .label-right {
            right: 20px;
            color: #4ecdc4;
        }

        /* 分界线 */
        .slider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #00d4ff 0%, #7c3aed 50%, #00d4ff 100%);
            z-index: 20;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .slider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 50%;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
            transition: transform 0.2s ease;
        }

        .slider-handle:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .slider-handle::before,
        .slider-handle::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-top: 2px solid #fff;
            border-right: 2px solid #fff;
        }

        .slider-handle::before {
            left: 12px;
            transform: rotate(-135deg);
        }

        .slider-handle::after {
            right: 12px;
            transform: rotate(45deg);
        }

        .slider-handle .handle-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
        }

        /* 控制按钮 */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 15;
        }

        .control-btn {
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: rgba(124, 58, 237, 0.5);
            border-color: #7c3aed;
        }

        .control-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 进度条 */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 15;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 提示 */
        .hint {
            text-align: center;
            margin-top: 20px;
            color: #5a6a8a;
            font-size: 0.85rem;
        }

        /* 加载提示 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            color: #8892b0;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .group-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }

            .slider-handle {
                width: 40px;
                height: 40px;
            }

            .label {
                font-size: 0.75rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>视频超分效果对比</h1>
        <p class="subtitle">拖动滑块查看不同清晰度的视频效果</p>

        <!-- 视频组选择器 -->
        <div class="video-group-selector" id="groupSelector">
            <button class="group-btn active" data-group="0">第一组：战斗场景</button>
            <button class="group-btn" data-group="1">第二组：墨染场景</button>
            <button class="group-btn" data-group="2">第三组：战争场景1</button>
            <button class="group-btn" data-group="3">第四组：战争场景2</button>
            <button class="group-btn" data-group="4">第五组：将军战斗</button>
        </div>

        <!-- 精度选择器 -->
        <div class="quality-selector">
            <button class="quality-btn" data-side="left">原视频 vs prob-4</button>
            <button class="quality-btn active" data-side="both">原视频 vs prob-4 vs slp-2.5</button>
        </div>

        <!-- 视频对比区域 -->
        <div class="video-comparison-container" id="comparisonContainer">
            <div class="video-wrapper video-low">
                <video id="videoLeft" muted playsinline loop>
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="video-wrapper video-middle" id="videoMiddleWrapper">
                <video id="videoMiddle" muted playsinline loop>
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="video-wrapper video-high" id="videoRightWrapper">
                <video id="videoRight" muted playsinline loop>
                    <source src="" type="video/mp4">
                </video>
            </div>

            <span class="label label-left" id="labelLeft">原视频</span>
            <span class="label label-right" id="labelRight">高精度</span>

            <div class="slider-line" id="sliderLine">
                <div class="slider-handle">
                    <div class="handle-dot"></div>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="playBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    播放
                </button>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">加载中...</div>
            </div>
        </div>

        <p class="hint">💡 拖动中间滑块或点击播放按钮查看效果 | 点击上方按钮切换视频组</p>
    </div>

    <script>
        // 视频数据配置
        const videoGroups = [
            {
                name: '战斗场景',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/fight_01.mp4',
                middle: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/fight-prob-4.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/fight-slp-2.5.mp4'
            },
            {
                name: '墨染场景',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/ink.mp4',
                middle: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/ink-prob-4.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/ink-slp-2.5.mp4'
            },
            {
                name: '战争场景1',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war01.mp4',
                middle: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war01-prob-4.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war01-slp-2.5.mp4'
            },
            {
                name: '战争场景2',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war02.mp4',
                middle: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war02-prob-4.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/war02-slp-2.5.mp4'
            },
            {
                name: '将军战斗',
                left: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/general_fight.mp4',
                middle: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/general_fight_prob-4.mp4',
                right: 'https://hym-1422126808.cos.ap-guangzhou.myqcloud.com/general_fight_slp-2.5.mp4'
            }
        ];

        let currentGroup = 0;
        let compareMode = 'both'; // 'left', 'both'
        let sliderPosition = 50;
        let isPlaying = false;
        let isDragging = false;

        const container = document.getElementById('comparisonContainer');
        const sliderLine = document.getElementById('sliderLine');
        const videoLeft = document.getElementById('videoLeft');
        const videoMiddle = document.getElementById('videoMiddle');
        const videoRight = document.getElementById('videoRight');
        const videoMiddleWrapper = document.getElementById('videoMiddleWrapper');
        const videoRightWrapper = document.getElementById('videoRightWrapper');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const labelLeft = document.getElementById('labelLeft');
        const labelRight = document.getElementById('labelRight');

        // 更新滑块位置
        function updateSliderPosition(position) {
            sliderPosition = Math.max(0, Math.min(100, position));
            sliderLine.style.left = sliderPosition + '%';

            if (compareMode === 'both') {
                // 三视频模式：中间视频在滑块位置，右侧高精度覆盖在右侧
                videoMiddleWrapper.style.clipPath = `inset(0 0 0 ${sliderPosition}%)`;
                videoRightWrapper.style.clipPath = `inset(0 ${100 - sliderPosition}% 0 0)`;
            } else {
                // 双视频模式：右侧视频在滑块位置
                videoRightWrapper.style.clipPath = `inset(0 0 0 ${sliderPosition}%)`;
            }
        }

        // 加载视频组
        function loadGroup(index) {
            const group = videoGroups[index];
            currentGroup = index;

            // 显示加载
            loadingOverlay.classList.remove('hidden');

            // 更新按钮状态
            document.querySelectorAll('.group-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });

            // 重置视频
            isPlaying = false;
            playBtn.innerHTML = `
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                播放
            `;
            progressFill.style.width = '0%';
            updateSliderPosition(50);

            // 设置视频源
            videoLeft.src = group.left;
            videoMiddle.src = group.middle;
            videoRight.src = group.right;

            // 等待视频加载
            Promise.all([
                new Promise(resolve => videoLeft.onloadedmetadata = resolve),
                new Promise(resolve => resolve())
            ]).then(() => {
                loadingOverlay.classList.add('hidden');
                videoLeft.play().then(() => videoLeft.pause());
            });
        }

        // 切换对比模式
        function setCompareMode(mode) {
            compareMode = mode;
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.side === mode);
            });

            if (mode === 'both') {
                labelLeft.textContent = '原视频';
                labelRight.textContent = 'slp-2.5';
                videoMiddleWrapper.style.display = 'block';
                videoMiddleWrapper.style.clipPath = `inset(0 0 0 ${sliderPosition}%)`;
                videoRightWrapper.style.clipPath = `inset(0 ${100 - sliderPosition}% 0 0)`;
            } else {
                labelLeft.textContent = '原视频';
                labelRight.textContent = 'prob-4';
                videoMiddleWrapper.style.display = 'none';
                videoRightWrapper.style.clipPath = `inset(0 0 0 ${sliderPosition}%)`;
            }
        }

        // 拖动事件
        function handleDragStart(e) {
            isDragging = true;
            handleDrag(e);
        }

        function handleDrag(e) {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const position = ((clientX - rect.left) / rect.width) * 100;
            updateSliderPosition(position);
        }

        function handleDragEnd() {
            isDragging = false;
        }

        container.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDrag);
        document.addEventListener('mouseup', handleDragEnd);
        container.addEventListener('touchstart', handleDragStart, { passive: true });
        document.addEventListener('touchmove', handleDrag, { passive: true });
        document.addEventListener('touchend', handleDragEnd);

        container.addEventListener('click', (e) => {
            if (!isDragging) {
                const rect = container.getBoundingClientRect();
                const position = ((e.clientX - rect.left) / rect.width) * 100;
                updateSliderPosition(position);
            }
        });

        // 播放控制
        function togglePlay() {
            if (isPlaying) {
                videoLeft.pause();
                videoMiddle.pause();
                videoRight.pause();
                playBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    播放
                `;
            } else {
                videoLeft.play();
                videoMiddle.play();
                videoRight.play();
                playBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                    暂停
                `;
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        videoLeft.addEventListener('timeupdate', () => {
            const progress = (videoLeft.currentTime / videoLeft.duration) * 100;
            progressFill.style.width = progress + '%';
        });

        videoLeft.addEventListener('ended', () => {
            videoMiddle.currentTime = 0;
            videoRight.currentTime = 0;
            progressFill.style.width = '0%';
            isPlaying = false;
            playBtn.innerHTML = `
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                播放
            `;
        });

        // 视频组切换
        document.getElementById('groupSelector').addEventListener('click', (e) => {
            if (e.target.classList.contains('group-btn')) {
                const index = parseInt(e.target.dataset.group);
                loadGroup(index);
            }
        });

        // 精度模式切换
        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setCompareMode(btn.dataset.side);
            });
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                updateSliderPosition(sliderPosition - 5);
            } else if (e.key === 'ArrowRight') {
                updateSliderPosition(sliderPosition + 5);
            } else if (e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
        });

        // 初始化
        loadGroup(0);
    </script>
</body>
</html>
